<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HideSpace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin:0; font-family:system-ui, sans-serif; background:#05060a; color:#f5f5f5; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .screen { display:none; width:100%; max-width:420px; padding:20px; box-sizing:border-box; }
    .screen.active { display:block; }
    h1,h2,h3 { margin:0 0 16px; }
    input,button { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:none; font-size:16px; box-sizing:border-box; }
    input { background:#11131b; color:#f5f5f5; }
    button { background:#3b82f6; color:white; font-weight:600; }
    button.secondary { background:#1f2937; }
    .small { font-size:13px; opacity:0.8; }
    .row { display:flex; gap:8px; }
    .row > button { flex:1; }
    .player-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #11131b; }
    .tag { font-size:12px; padding:4px 8px; border-radius:999px; cursor:pointer; }
    .tag.hider { background:#22c55e22; color:#22c55e; }
    .tag.seeker { background:#ef444422; color:#ef4444; }
  </style>
</head>
<body>

<div id="screen-name" class="screen active">
  <h1>HideSpace</h1>
  <p>Enter a username to start.</p>
  <input id="username" placeholder="Username" autocomplete="off" />
  <button id="btnNameContinue">Continue</button>
</div>

<div id="screen-role" class="screen">
  <h2>What do you want to do?</h2>
  <button id="btnHost">Host Game</button>
  <button id="btnJoin" class="secondary">Join Game</button>
  <p class="small">Base link:<br><span id="baseLink"></span></p>
</div>

<div id="screen-host" class="screen">
  <h2>Host Lobby</h2>
  <p>Room URL:</p>
  <p id="hostRoomUrl" style="word-break:break-all;"></p>
  <p class="small">Share this link or show a QR (A1/A2 wiring comes next).</p>

  <h3>Players</h3>
  <div id="playerList"></div>

  <div class="row" style="margin-top:16px;">
    <button id="btnShowQrA1" class="secondary">QR (2‑way)</button>
    <button id="btnShowQrA2" class="secondary">QR (1‑way)</button>
  </div>

  <button id="btnStartGame" style="margin-top:16px;">Start Game</button>
</div>

<div id="screen-join" class="screen">
  <h2>Join Game</h2>
  <p class="small">You opened:<br><span id="currentUrl"></span></p>
  <p class="small">If this URL ends with a 4‑letter code (like <code>/FJQP</code>), you’re in that room.</p>
  <button id="btnJoinConfirm">Join This Room</button>
</div>

<script>
  const BASE_URL = "https://beansman692.github.io/hideSpace/";
  const LETTERS = "ABCDEFGHJKLMNPQRSTUVWXYZ"; // no I/O to avoid confusion

  let myName = "";
  let isHost = false;
  let roomCode = "";
  let players = [];

  const screenName = document.getElementById("screen-name");
  const screenRole = document.getElementById("screen-role");
  const screenHost = document.getElementById("screen-host");
  const screenJoin = document.getElementById("screen-join");

  const usernameInput = document.getElementById("username");
  const btnNameContinue = document.getElementById("btnNameContinue");
  const btnHost = document.getElementById("btnHost");
  const btnJoin = document.getElementById("btnJoin");
  const baseLink = document.getElementById("baseLink");
  const hostRoomUrl = document.getElementById("hostRoomUrl");
  const playerList = document.getElementById("playerList");
  const btnShowQrA1 = document.getElementById("btnShowQrA1");
  const btnShowQrA2 = document.getElementById("btnShowQrA2");
  const btnStartGame = document.getElementById("btnStartGame");
  const currentUrl = document.getElementById("currentUrl");
  const btnJoinConfirm = document.getElementById("btnJoinConfirm");

  function showScreen(el) {
    [screenName, screenRole, screenHost, screenJoin].forEach(s => s.classList.remove("active"));
    el.classList.add("active");
  }

  function getCode(len = 4) {
    let out = "";
    for (let i = 0; i < len; i++) {
      out += LETTERS[Math.floor(Math.random() * LETTERS.length)];
    }
    return out;
  }

  function getRoomFromUrl() {
    const url = new URL(window.location.href);
    const parts = url.pathname.split("/");
    let last = parts[parts.length - 1];
    if (!last) last = parts[parts.length - 2] || "";
    last = last.trim().toUpperCase();
    if (/^[A-Z]{4}$/.test(last)) return last;
    return "";
  }

  function buildRoomUrl(code) {
    return BASE_URL + encodeURIComponent(code);
  }

  function renderPlayers() {
    playerList.innerHTML = "";
    players.forEach(p => {
      const row = document.createElement("div");
      row.className = "player-row";
      const nameSpan = document.createElement("span");
      nameSpan.textContent = p.name;
      const tag = document.createElement("span");
      tag.className = "tag " + (p.role === "seeker" ? "seeker" : "hider");
      tag.textContent = p.role === "seeker" ? "Seeker" : "Hider";
      tag.onclick = () => {
        p.role = p.role === "seeker" ? "hider" : "seeker";
        renderPlayers();
      };
      row.appendChild(nameSpan);
      row.appendChild(tag);
      playerList.appendChild(row);
    });
  }

  baseLink.textContent = BASE_URL;

  // Username screen
  btnNameContinue.onclick = () => {
    const name = usernameInput.value.trim();
    if (!name) return alert("Enter a username");
    myName = name;
    showScreen(screenRole);
  };

  // Host flow
  btnHost.onclick = () => {
    isHost = true;
    roomCode = getCode(4);
    const newUrl = buildRoomUrl(roomCode);
    hostRoomUrl.textContent = newUrl;

    players = [{ id: "host", name: myName, role: "seeker" }]; // host default seeker
    renderPlayers();

    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, "", newUrl);
    }

    showScreen(screenHost);
  };

  // Join flow
  btnJoin.onclick = () => {
    currentUrl.textContent = window.location.href;
    showScreen(screenJoin);
  };

  btnJoinConfirm.onclick = () => {
    const code = getRoomFromUrl();
    if (!code) {
      alert("This URL has no 4‑letter room code at the end.\nAsk the host to send you their link.");
      return;
    }
    roomCode = code;
    // Here is where QR/WebRTC join logic will go.
    alert("Joining room: " + roomCode + "\n(Next step: wire QR/WebRTC here.)");
  };

  // QR buttons (placeholders for A1 + A2)
  btnShowQrA1.onclick = () => {
    alert("QR (2‑way) placeholder.\nWe’ll encode " + buildRoomUrl(roomCode) + " + WebRTC offer here.");
  };

  btnShowQrA2.onclick = () => {
    alert("QR (1‑way) placeholder.\nWe’ll encode " + buildRoomUrl(roomCode) + " + quick‑join data here.");
  };

  btnStartGame.onclick = () => {
    alert("Game start placeholder.\nPlayers: " + players.map(p => `${p.name} (${p.role})`).join(", "));
    // Next: show map, tagging, timer, etc.
  };
</script>
</body>
</html>
