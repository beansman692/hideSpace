<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HideSpace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    body { margin:0; font-family:system-ui, sans-serif; background:#05060a; color:#f5f5f5; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .wrap { width:100%; max-width:420px; padding:20px; box-sizing:border-box; }
    h1,h2 { margin:0 0 16px; }
    input,button { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:none; font-size:16px; box-sizing:border-box; }
    input { background:#11131b; color:#f5f5f5; }
    button { background:#3b82f6; color:white; font-weight:600; cursor:pointer; }
    button.secondary { background:#1f2937; }
    .small { font-size:13px; opacity:0.8; }
    #qrScanner { display:none; margin-top:12px; }
    #qrVideo { width:100%; border-radius:12px; background:#000; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>HideSpace</h1>

  <label class="small">Your name</label>
  <input id="nameInput" placeholder="Name" autocomplete="off" />

  <button id="btnHost">Host Game</button>

  <h2 style="margin-top:24px;">Join</h2>
  <input id="roomInput" placeholder="Room code (4 letters)" maxlength="4" />
  <button id="btnJoin">Join by code</button>
  <button id="btnScanQr" class="secondary">Join by QR</button>

  <div id="qrScanner">
    <video id="qrVideo"></video>
    <canvas id="qrCanvas" style="display:none;"></canvas>
    <button id="btnCloseScan" class="secondary">Close scanner</button>
  </div>

  <p class="small" style="margin-top:24px;">Base URL: <span id="baseUrl"></span></p>
</div>

<script>
  const BASE_URL = "https://beansman692.github.io/hideSpace/game.html";

  const nameInput = document.getElementById("nameInput");
  const roomInput = document.getElementById("roomInput");
  const btnHost = document.getElementById("btnHost");
  const btnJoin = document.getElementById("btnJoin");
  const btnScanQr = document.getElementById("btnScanQr");
  const btnCloseScan = document.getElementById("btnCloseScan");
  const qrScanner = document.getElementById("qrScanner");
  const qrVideo = document.getElementById("qrVideo");
  const qrCanvas = document.getElementById("qrCanvas");
  const baseUrlSpan = document.getElementById("baseUrl");

  baseUrlSpan.textContent = BASE_URL;

  let qrStream = null;
  let qrLoop = null;

  function getName() {
    const n = nameInput.value.trim();
    if (!n) {
      alert("Enter a name first");
      return null;
    }
    return encodeURIComponent(n);
  }

  btnHost.onclick = () => {
    const n = getName();
    if (!n) return;
    // host mode, name only – room code generated in game.html
    window.location.href = `${BASE_URL}?mode=host&name=${n}`;
  };

  btnJoin.onclick = () => {
    const n = getName();
    if (!n) return;
    const code = roomInput.value.trim().toUpperCase();
    if (!/^[A-Z]{4}$/.test(code)) {
      alert("Room code must be 4 letters");
      return;
    }
    window.location.href = `${BASE_URL}?mode=join&name=${n}&room=${code}`;
  };

  btnScanQr.onclick = async () => {
    try {
      qrScanner.style.display = "block";
      qrStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
      qrVideo.srcObject = qrStream;
      qrVideo.setAttribute("playsinline", true);
      await qrVideo.play();

      const ctx = qrCanvas.getContext("2d");
      qrLoop = setInterval(() => {
        if (qrVideo.readyState !== qrVideo.HAVE_ENOUGH_DATA) return;
        qrCanvas.width = qrVideo.videoWidth;
        qrCanvas.height = qrVideo.videoHeight;
        ctx.drawImage(qrVideo, 0, 0, qrCanvas.width, qrCanvas.height);
        const imgData = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height);
        if (code && code.data) {
          stopScan();
          // Expect QR to contain full game.html URL
          window.location.href = code.data;
        }
      }, 120);
    } catch (e) {
      alert("Camera error: " + e.message);
      stopScan();
    }
  };

  function stopScan() {
    qrScanner.style.display = "none";
    clearInterval(qrLoop);
    if (qrStream) qrStream.getTracks().forEach(t => t.stop());
  }

  btnCloseScan.onclick = stopScan;
</script>
</body>
</html>
